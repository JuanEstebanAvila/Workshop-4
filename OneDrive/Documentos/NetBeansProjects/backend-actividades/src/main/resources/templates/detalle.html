<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Actividad: ' + ${actividad.titulo}">Actividad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema: #FAF6F0;
            --tinta: #1F2937;
            --terracota: #B8451F;
            --salvia: #6B8E5A;
            --navy: #1E3A5F;
            --borde: #E7E2D9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--crema);
            color: var(--tinta);
            padding: 3rem 2rem;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }
        a.volver {
            display: inline-block;
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        a.volver:before { content: "← "; }
        .tipo {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 0.3rem 0.8rem;
            border-radius: 99px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .FISICA         { background: #FEE2D6; color: #92310C; }
        .ACOMPANAMIENTO { background: #DCEFD2; color: #3F5C2D; }
        .SUPERVISION    { background: #DCE4F0; color: #1E3A5F; }
        .CREATIVIDAD    { background: #F8E2D9; color: #92310C; }
        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 3rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }
        .descripcion {
            font-size: 1.1rem;
            color: #4B5563;
            padding: 2rem;
            background: white;
            border-left: 4px solid var(--terracota);
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        dl {
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 0.75rem 2rem;
            background: white;
            padding: 2rem;
            border: 1px solid var(--borde);
            border-radius: 14px;
        }
        dt {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            color: var(--navy);
        }
        dd { font-family: 'Manrope', monospace; }
    </style>
</head>
<body>
<a class="volver" th:href="@{/vista/actividades}">Volver al listado</a>

<span th:class="'tipo ' + ${actividad.tipoActividad}" th:text="${actividad.tipoActividad}">FISICA</span>
<h1 th:text="${actividad.titulo}">Título</h1>
<p class="descripcion" th:text="${actividad.descripcion}">Descripción detallada.</p>

<dl>
    <dt>Id</dt>            <dd th:text="${actividad.id}">1</dd>
    <dt>Fecha inicio</dt>  <dd th:text="${actividad.fechaInicio}">2026-01-01</dd>
    <dt>Fecha fin</dt>     <dd th:text="${actividad.fechaTerminacion}">2026-01-02</dd>
    <dt>Quehacer</dt>      <dd th:text="${actividad.idQuehacer}">1</dd>
    <dt>Tutor</dt>         <dd th:text="${actividad.idTutor}">100</dd>
    <dt>Hijo a cargo</dt>  <dd th:text="${actividad.idHijo}">200</dd>
</dl>
</body>
</html>
