<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad no encontrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background: #FAF6F0;
            color: #1F2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        .grande {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 6rem;
            color: #B8451F;
            line-height: 1;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 2rem;
            margin: 1rem 0;
        }
        p { color: #4B5563; max-width: 40ch; margin-bottom: 2rem; }
        a {
            color: #1E3A5F;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid #B8451F;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>
<div class="grande">404</div>
<h1>Actividad no encontrada</h1>
<p>No existe ninguna actividad con el id <strong th:text="${idBuscado}">0</strong> en la base de datos.</p>
<a th:href="@{/vista/actividades}">Volver al listado</a>
</body>
</html>
