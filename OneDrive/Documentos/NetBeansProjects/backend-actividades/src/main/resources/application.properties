# =========================================================================
# CONFIGURACI\u00c3\u0093N DE LA APLICACI\u00c3\u0093N BACKEND-ACTIVIDADES
# Taller No 4 - Programacion Avanzada
# Universidad Distrital Francisco Jose de Caldas
# =========================================================================

# -------------------------------------------------------------------------
# Servidor embebido
# -------------------------------------------------------------------------
server.port=8080
server.servlet.context-path=/

# -------------------------------------------------------------------------
# Base de datos H2 en memoria
# La URL incluye DB_CLOSE_DELAY=-1 para que la BD persista mientras la JVM
# est\u00c3\u00a9 viva, y MODE=MySQL para usar dialecto compatible.
# -------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:bd_actividades;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -------------------------------------------------------------------------
# Consola web de H2: accesible en http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:bd_actividades
# -------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# -------------------------------------------------------------------------
# JPA / Hibernate
# create-drop: regenera el esquema cada vez que arranca (apto para H2 en
# memoria). En producci\u00c3\u00b3n usar\u00c3\u00adamos Flyway o Liquibase.
# -------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# -------------------------------------------------------------------------
# Thymeleaf
# -------------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# -------------------------------------------------------------------------
# Jackson (formato de fechas en JSON)
# -------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# -------------------------------------------------------------------------
# Bit\u00c3\u00a1cora
# -------------------------------------------------------------------------
logging.level.co.edu.udistrital.actividades=INFO
logging.level.org.springframework.web=INFO
