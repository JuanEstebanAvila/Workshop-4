<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Actividades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema: #FAF6F0;
            --tinta: #1F2937;
            --terracota: #B8451F;
            --salvia: #6B8E5A;
            --navy: #1E3A5F;
            --borde: #E7E2D9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--crema);
            color: var(--tinta);
            padding: 3rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        h1 em { font-style: italic; color: var(--terracota); font-weight: 400; }
        p.lead { color: #4B5563; margin-bottom: 2rem; }
        a.volver {
            display: inline-block;
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        a.volver:before { content: "← "; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border: 1px solid var(--borde);
            border-radius: 14px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(31,41,55,0.08);
        }
        .card h3 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.3rem;
            margin: 0.5rem 0;
            color: var(--navy);
        }
        .card p {
            font-size: 0.9rem;
            color: #4B5563;
            margin-bottom: 1rem;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #9CA3AF;
            border-top: 1px solid var(--borde);
            padding-top: 0.8rem;
        }
        .tipo {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 0.25rem 0.7rem;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
        }
        .FISICA         { background: #FEE2D6; color: #92310C; }
        .ACOMPANAMIENTO { background: #DCEFD2; color: #3F5C2D; }
        .SUPERVISION    { background: #DCE4F0; color: #1E3A5F; }
        .CREATIVIDAD    { background: #F8E2D9; color: #92310C; }
        .vacio {
            text-align: center;
            padding: 4rem;
            color: #9CA3AF;
            border: 1px dashed var(--borde);
            border-radius: 14px;
        }
    </style>
</head>
<body>
<a class="volver" th:href="@{/vista}">Volver al inicio</a>
<h1>Todas las <em>actividades</em></h1>
<p class="lead">Listado completo recuperado desde la base de datos H2.</p>

<div class="grid" th:if="${not #lists.isEmpty(actividades)}">
    <div class="card" th:each="act : ${actividades}">
        <span th:class="'tipo ' + ${act.tipoActividad}" th:text="${act.tipoActividad}">FISICA</span>
        <h3 th:text="${act.titulo}">Título</h3>
        <p th:text="${act.descripcion}">Descripción de la actividad.</p>
        <div class="meta">
            <span>
                <span th:text="${act.fechaInicio}">2026-01-01</span> →
                <span th:text="${act.fechaTerminacion}">2026-01-02</span>
            </span>
            <span>id <span th:text="${act.id}">1</span></span>
        </div>
    </div>
</div>

<div class="vacio" th:if="${#lists.isEmpty(actividades)}">
    Aún no hay actividades registradas.
</div>
</body>
</html>
